<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админ-панель — Эпоха Пепла</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="page-screen">
  <nav class="top-nav">
    <a href="index.html">Главная</a>
    <a href="pages/quests.html">Квесты</a>
    <a href="pages/characters.html">Персонажи</a>
  </nav>

  <h1>Админ-панель</h1>
  <p>Управление кодексом кампании.</p>

  <section class="quest-card">
    <h2 id="formTitle">Новый квест</h2>

    <input id="questTitle" placeholder="Название квеста">
    <textarea id="questDescription" placeholder="Описание квеста"></textarea>
    <input id="questDifficulty" placeholder="Сложность">
    <input id="questGiver" placeholder="Кто выдал">
    <input id="questReward" placeholder="Награда">

    <select id="questStatus">
      <option value="active">Активный</option>
      <option value="completed">Завершён</option>
      <option value="failed">Провален</option>
    </select>

    <button id="saveQuestBtn" class="main-button">Сохранить квест</button>
    <button id="clearFormBtn" class="main-button" type="button">Очистить форму</button>

    <p id="adminMessage"></p>
  </section>

  <section class="quest-card">
    <h2>Существующие квесты</h2>
    <div id="questsAdminList"></div>
  </section>

  <section class="quest-card">
    <h2 id="characterFormTitle">Персонажи</h2>

    <select id="characterSelect">
      <option value="">Выбрать персонажа</option>
    </select>

    <h3>Основная информация</h3>
    <input id="characterName" placeholder="Имя">
    <input id="characterRace" placeholder="Раса">
    <input id="characterClass" placeholder="Класс">
    <input id="characterDomain" placeholder="Подкласс / домен / роль">
    <input id="characterDomainLabel" placeholder="Название поля подкласса, например: Домен">
    <input id="characterGod" placeholder="Покровитель">
    <input id="characterStatus" placeholder="Статус">
    <input id="characterRole" placeholder="Роль">
    <input id="characterImage" placeholder="Путь к изображению">

    <textarea id="characterDescription" placeholder="Краткое описание"></textarea>
    <textarea id="characterBiography" placeholder="Полная биография"></textarea>

    <h3>Характеристики</h3>
    <div class="info-grid">
      <div><span>Сила</span><input id="strValue" placeholder="10"><input id="strMod" placeholder="+0"></div>
      <div><span>Ловкость</span><input id="dexValue" placeholder="10"><input id="dexMod" placeholder="+0"></div>
      <div><span>Телосложение</span><input id="conValue" placeholder="10"><input id="conMod" placeholder="+0"></div>
      <div><span>Интеллект</span><input id="intValue" placeholder="10"><input id="intMod" placeholder="+0"></div>
      <div><span>Мудрость</span><input id="wisValue" placeholder="10"><input id="wisMod" placeholder="+0"></div>
      <div><span>Харизма</span><input id="chaValue" placeholder="10"><input id="chaMod" placeholder="+0"></div>
    </div>

    <h3>Боевые данные</h3>
    <div class="info-grid">
      <div><span>Уровень</span><input id="combatLevel" placeholder="1"></div>
      <div><span>КД</span><input id="combatAc" placeholder="10"></div>
      <div><span>Хиты</span><input id="combatHp" placeholder="10"></div>
      <div><span>Скорость</span><input id="combatSpeed" placeholder="30 фт."></div>
      <div><span>Владение</span><input id="combatProficiency" placeholder="+2"></div>
      <div><span>Инициатива</span><input id="combatInitiative" placeholder="+0"></div>
    </div>

    <h3>Личность</h3>
    <textarea id="characterPersonality" placeholder="Черты характера"></textarea>
    <textarea id="characterIdeals" placeholder="Идеалы"></textarea>

    <button id="newCharacterBtn" class="main-button" type="button">Новый персонаж</button>
    <button id="saveCharacterBtn" class="main-button">Сохранить персонажа</button>
    <button id="deleteCharacterBtn" class="main-button" type="button">Удалить персонажа</button>

    <p id="characterMessage"></p>
  </section>
</main>

<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>
  let editingQuestId = null;
  let editingCharacterId = null;
  let currentCharacterData = null;

  const formTitle = document.querySelector("#formTitle");
  const saveQuestBtn = document.querySelector("#saveQuestBtn");
  const clearFormBtn = document.querySelector("#clearFormBtn");
  const adminMessage = document.querySelector("#adminMessage");
  const questsAdminList = document.querySelector("#questsAdminList");

  const questTitle = document.querySelector("#questTitle");
  const questDescription = document.querySelector("#questDescription");
  const questDifficulty = document.querySelector("#questDifficulty");
  const questGiver = document.querySelector("#questGiver");
  const questReward = document.querySelector("#questReward");
  const questStatus = document.querySelector("#questStatus");

  const characterSelect = document.querySelector("#characterSelect");
  const characterName = document.querySelector("#characterName");
  const characterRace = document.querySelector("#characterRace");
  const characterClass = document.querySelector("#characterClass");
  const characterDomain = document.querySelector("#characterDomain");
  const characterDomainLabel = document.querySelector("#characterDomainLabel");
  const characterGod = document.querySelector("#characterGod");
  const characterStatus = document.querySelector("#characterStatus");
  const characterRole = document.querySelector("#characterRole");
  const characterImage = document.querySelector("#characterImage");
  const characterDescription = document.querySelector("#characterDescription");
  const characterBiography = document.querySelector("#characterBiography");
  const characterPersonality = document.querySelector("#characterPersonality");
  const characterIdeals = document.querySelector("#characterIdeals");
  const characterMessage = document.querySelector("#characterMessage");
  const saveCharacterBtn = document.querySelector("#saveCharacterBtn");
  const newCharacterBtn = document.querySelector("#newCharacterBtn");
  const deleteCharacterBtn = document.querySelector("#deleteCharacterBtn");

  const abilityInputs = {
    str: { value: document.querySelector("#strValue"), mod: document.querySelector("#strMod") },
    dex: { value: document.querySelector("#dexValue"), mod: document.querySelector("#dexMod") },
    con: { value: document.querySelector("#conValue"), mod: document.querySelector("#conMod") },
    int: { value: document.querySelector("#intValue"), mod: document.querySelector("#intMod") },
    wis: { value: document.querySelector("#wisValue"), mod: document.querySelector("#wisMod") },
    cha: { value: document.querySelector("#chaValue"), mod: document.querySelector("#chaMod") }
  };

  const combatInputs = {
    level: document.querySelector("#combatLevel"),
    ac: document.querySelector("#combatAc"),
    hp: document.querySelector("#combatHp"),
    speed: document.querySelector("#combatSpeed"),
    proficiency: document.querySelector("#combatProficiency"),
    initiative: document.querySelector("#combatInitiative")
  };

  function clearForm() {
    editingQuestId = null;
    formTitle.textContent = "Новый квест";
    questTitle.value = "";
    questDescription.value = "";
    questDifficulty.value = "";
    questGiver.value = "";
    questReward.value = "";
    questStatus.value = "active";
  }

  async function loadQuests() {
    const snapshot = await db.collection("quests").get();
    const quests = [];

    snapshot.forEach(doc => {
      quests.push({ docId: doc.id, ...doc.data() });
    });

    quests.sort((a, b) => Number(a.id) - Number(b.id));

    questsAdminList.innerHTML = quests.map(quest => `
      <div class="quest-info" style="margin-bottom: 16px;">
        <div><span>${getStatusName(quest.status)}</span><strong>${quest.title}</strong></div>
        <div><span>Выдал</span><strong>${quest.giver}</strong></div>
        <div>
          <button class="editQuestBtn" data-id="${quest.docId}">✏️ Редактировать</button>
          <button class="deleteQuestBtn" data-id="${quest.docId}">🗑️ Удалить</button>
        </div>
      </div>
    `).join("");

    document.querySelectorAll(".editQuestBtn").forEach(button => {
      button.addEventListener("click", async () => {
        const docId = button.dataset.id;
        const doc = await db.collection("quests").doc(docId).get();
        const quest = doc.data();

        editingQuestId = docId;
        formTitle.textContent = "Редактирование квеста";

        questTitle.value = quest.title || "";
        questDescription.value = quest.description || "";
        questDifficulty.value = quest.difficulty || "";
        questGiver.value = quest.giver || "";
        questReward.value = quest.reward || "";
        questStatus.value = quest.status || "active";

        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    document.querySelectorAll(".deleteQuestBtn").forEach(button => {
      button.addEventListener("click", async () => {
        if (!confirm("Удалить этот квест?")) return;

        await db.collection("quests").doc(button.dataset.id).delete();
        adminMessage.textContent = "Квест удалён.";
        clearForm();
        loadQuests();
      });
    });
  }

  function getStatusName(status) {
    if (status === "active") return "Активный";
    if (status === "completed") return "Завершён";
    if (status === "failed") return "Провален";
    return "Неизвестно";
  }

  saveQuestBtn.addEventListener("click", async () => {
    const quest = {
      id: editingQuestId ? Number(editingQuestId.replace("quest-", "")) : Date.now(),
      title: questTitle.value.trim(),
      description: questDescription.value.trim(),
      difficulty: questDifficulty.value.trim(),
      giver: questGiver.value.trim(),
      reward: questReward.value.trim(),
      status: questStatus.value
    };

    const docId = editingQuestId || `quest-${quest.id}`;

    await db.collection("quests").doc(docId).set(quest);

    adminMessage.textContent = editingQuestId ? "Квест обновлён." : "Квест создан.";
    clearForm();
    loadQuests();
  });

  clearFormBtn.addEventListener("click", clearForm);

  async function loadCharacters() {
    const snapshot = await db.collection("characters").get();
    characterSelect.innerHTML = `<option value="">Выбрать персонажа</option>`;

    snapshot.forEach(doc => {
      const character = doc.data();
      characterSelect.innerHTML += `<option value="${doc.id}">${character.name}</option>`;
    });
  }

  function setAbilities(abilities = {}) {
    Object.keys(abilityInputs).forEach(key => {
      abilityInputs[key].value.value = abilities[key]?.value || "10";
      abilityInputs[key].mod.value = abilities[key]?.mod || "+0";
    });
  }

  function getAbilities() {
    return {
      str: { value: abilityInputs.str.value.value.trim(), mod: abilityInputs.str.mod.value.trim() },
      dex: { value: abilityInputs.dex.value.value.trim(), mod: abilityInputs.dex.mod.value.trim() },
      con: { value: abilityInputs.con.value.value.trim(), mod: abilityInputs.con.mod.value.trim() },
      int: { value: abilityInputs.int.value.value.trim(), mod: abilityInputs.int.mod.value.trim() },
      wis: { value: abilityInputs.wis.value.value.trim(), mod: abilityInputs.wis.mod.value.trim() },
      cha: { value: abilityInputs.cha.value.value.trim(), mod: abilityInputs.cha.mod.value.trim() }
    };
  }

  function setCombat(combat = {}) {
    combatInputs.level.value = combat.level || "1";
    combatInputs.ac.value = combat.ac || "10";
    combatInputs.hp.value = combat.hp || "10";
    combatInputs.speed.value = combat.speed || "30 фт.";
    combatInputs.proficiency.value = combat.proficiency || "+2";
    combatInputs.initiative.value = combat.initiative || "+0";
  }

  function getCombat() {
    return {
      level: combatInputs.level.value.trim(),
      ac: combatInputs.ac.value.trim(),
      hp: combatInputs.hp.value.trim(),
      speed: combatInputs.speed.value.trim(),
      proficiency: combatInputs.proficiency.value.trim(),
      initiative: combatInputs.initiative.value.trim()
    };
  }

  function clearCharacterForm() {
    editingCharacterId = null;
    currentCharacterData = null;

    characterSelect.value = "";
    characterName.value = "";
    characterRace.value = "";
    characterClass.value = "";
    characterDomain.value = "";
    characterDomainLabel.value = "Особенность";
    characterGod.value = "";
    characterStatus.value = "";
    characterRole.value = "";
    characterImage.value = "";
    characterDescription.value = "";
    characterBiography.value = "";
    characterPersonality.value = "";
    characterIdeals.value = "";
    setAbilities();
    setCombat();

    characterMessage.textContent = "Создание нового персонажа.";
  }

  characterSelect.addEventListener("change", async () => {
    const docId = characterSelect.value;
    if (!docId) return;

    const doc = await db.collection("characters").doc(docId).get();
    const character = doc.data();

    editingCharacterId = docId;
    currentCharacterData = character;

    characterName.value = character.name || "";
    characterRace.value = character.race || "";
    characterClass.value = character.class || "";
    characterDomain.value = character.domain || "";
    characterDomainLabel.value = character.domainLabel || "Особенность";
    characterGod.value = character.god || "";
    characterStatus.value = character.status || "";
    characterRole.value = character.role || "";
    characterImage.value = character.image || "";
    characterDescription.value = character.description || "";
    characterBiography.value = character.biography || "";
    characterPersonality.value = character.personality || "";
    characterIdeals.value = character.ideals || "";
    setAbilities(character.abilities);
    setCombat(character.combat);
  });

  saveCharacterBtn.addEventListener("click", async () => {
    const characterId = editingCharacterId || `character-${Date.now()}`;

    const updatedCharacter = {
      ...(currentCharacterData || {}),
      name: characterName.value.trim(),
      race: characterRace.value.trim(),
      class: characterClass.value.trim(),
      domain: characterDomain.value.trim(),
      domainLabel: characterDomainLabel.value.trim() || "Особенность",
      god: characterGod.value.trim(),
      status: characterStatus.value.trim(),
      role: characterRole.value.trim(),
      image: characterImage.value.trim(),
      description: characterDescription.value.trim(),
      biography: characterBiography.value.trim(),
      personality: characterPersonality.value.trim(),
      ideals: characterIdeals.value.trim(),
      abilities: getAbilities(),
      combat: getCombat(),
      companion: currentCharacterData?.companion || null
    };

    await db.collection("characters").doc(characterId).set(updatedCharacter);

    characterMessage.textContent = editingCharacterId ? "Персонаж обновлён." : "Персонаж создан.";
    editingCharacterId = characterId;
    currentCharacterData = updatedCharacter;

    await loadCharacters();
    characterSelect.value = characterId;
  });

  newCharacterBtn.addEventListener("click", clearCharacterForm);

  deleteCharacterBtn.addEventListener("click", async () => {
    if (!editingCharacterId) {
      characterMessage.textContent = "Сначала выбери персонажа.";
      return;
    }

    if (!confirm("Удалить этого персонажа?")) return;

    await db.collection("characters").doc(editingCharacterId).delete();

    characterMessage.textContent = "Персонаж удалён.";
    clearCharacterForm();
    await loadCharacters();
    characterSelect.value = "";
  });

  loadQuests();
  loadCharacters();
</script>

</body>
</html>
