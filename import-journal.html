<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Импорт журнала</title>
</head>
<body style="background:#080705;color:#ead7aa;font-family:Georgia,serif;padding:40px;">
  <h1>Импорт журнала в Firebase</h1>
  <button id="importBtn" style="padding:14px 24px;font-size:18px;">Импортировать journal.json</button>
  <pre id="log"></pre>

  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>

  <script>
    const log = document.querySelector("#log");

    document.querySelector("#importBtn").addEventListener("click", async () => {
      log.textContent = "Загружаю journal.json...\n";

      const response = await fetch("data/journal.json");
      const entries = await response.json();

      for (const entry of entries) {
        const id = `session-${entry.id}`;

        await db.collection("journal").doc(id).set(entry);

        log.textContent += `Добавлена запись: ${entry.title}\n`;
      }

      log.textContent += "\nГотово. Журнал перенесён в Firestore.";
    });
  </script>
</body>
</html>
